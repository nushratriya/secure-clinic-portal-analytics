<!DOCTYPE html>
<html lang="en">
<head>
    <title>Aesthetics Portal - Secure Login</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fcfcfc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 45px; border-radius: 12px; box-shadow: 0 4px 30px rgba(0,0,0,0.03); width: 310px; text-align: center; border: 1px solid #eee; }
        h2 { font-weight: 300; letter-spacing: 3px; color: #111; margin-bottom: 5px; }
        p.subtitle { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 35px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 14px; background-color: #f8fafc; transition: border 0.2s; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #cbd5e1; outline: none; }
        button { width: 100%; padding: 14px; background-color: #111; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 15px; }
        button:hover { background-color: #333; }
        
        /* Muted Inline Error Box - Sits natively inside the card layout */
        .inline-error-box { color: #9b2c2c; font-size: 13px; margin-top: 20px; background: #fff5f5; padding: 12px; border-radius: 8px; border: 1px solid #fed7d7; text-align: left; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>MEDI SPA</h2>
        <p class="subtitle">Clinical Management Environment</p>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Secure Sign In</button>
        </form>
        
        {% if error %}
            <div class="inline-error-box">
                {{ error }}
            </div>
        {% endif %}
    </div>
</body>
</html>
